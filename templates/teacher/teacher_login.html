{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teacher Login | Learnalytics</title>
    <link rel="stylesheet" href="{% static 'css/admin_login.css' %}">
</head>

<body>

    <div class="wrap">
        <div class="card">
            <div class="brand">
                <div class="logo">L</div>
                <div class="brand-text">
                    <h1>Learnalytics</h1>
                    <p>Teacher Portal</p>
                </div>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="error-box">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="input-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter Teacher ID" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <button class="btn-login" type="submit">Login to Dashboard</button>

                <div class="links">
                    <a href="{% url 'home' %}" class="link-item">← Back to Home</a>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
