{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set New Password | Learnalytics Admin</title>
    <link rel="stylesheet" href="{% static 'css/password_reset.css' %}">
</head>

<body>

    <div class="wrap">
        <div class="card">
            <div class="brand">
                <div class="logo">L</div>
                <div>
                    <h1>Learnalytics</h1>
                    <p>Admin Panel</p>
                </div>
            </div>

            {% if validlink %}
            <h2>Set New Password</h2>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn" type="submit">Reset Password</button>
            </form>
            {% else %}
            <h2>Invalid Link</h2>
            <p>The password reset link is invalid or has expired.</p>
            <div class="links">
                <a href="{% url 'password_reset' %}">Request a new reset link</a>
            </div>
            {% endif %}

            <div class="links">
                <a href="{% url 'admin:login' %}">← Back to Login</a>
            </div>
        </div>
    </div>

</body>
