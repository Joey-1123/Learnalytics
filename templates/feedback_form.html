{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Portal | Learnalytics</title>
    <link rel="stylesheet" href="{% static 'css/feedback.css' %}">
</head>

<body>

    <div class="feedback-wrapper">
        <header class="form-header">
            <div class="form-logo">L</div>
            <div class="header-text">
                <h1>Student Feedback</h1>
                <p>Academic Subject Difficulty Report</p>
            </div>
        </header>

        <div class="form-container">
            {% if error %}
            <div class="error-banner">
                <span class="error-icon">⚠️</span> {{ error }}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="form-grid">
                    <div class="field-group">
                        <label for="subject">Subject Name</label>
                        <input type="text" id="subject" name="subject" placeholder="e.g. Data Structures" required>
                    </div>

                    <div class="field-group">
                        <label for="difficulty">Difficulty (1-10)</label>
                        <input type="number" id="difficulty" name="difficulty" min="1" max="10"
                            placeholder="Select rating" required>
                    </div>
                </div>

                <div class="field-group full-width">
                    <label for="description">Detailed Description</label>
                    <textarea id="description" name="description"
                        placeholder="Share your experience with this subject..." rows="5"></textarea>
                </div>

                <div class="form-actions">
                    <a class="btn-link" href="/">← Back to Home</a>
                    <button class="btn-submit" type="submit">Submit Feedback</button>
                </div>
            </form>
        </div>

        <footer class="form-footer">
            © 2026 Learnalytics Performance Tracker
        </footer>
    </div>

</body>

</html>
