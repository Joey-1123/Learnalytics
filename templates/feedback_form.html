{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Feedback | Learnalytics</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="logo">L</div>
                <div class="title">
                    <h1>Student Feedback</h1>
                    <p>Tell us subject difficulty (1 to 5)</p>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top:16px;">
            {% if error %}
            <p style="color:#a40000; font-weight:600;">{{ error }}</p>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <label style="display:block; margin-top:10px;">Subject</label>
                <input type="text" name="subject" placeholder="e.g. Data Structures"
                    style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px;">

                <label style="display:block; margin-top:10px;">Difficulty (1-5)</label>
                <input type="number" name="difficulty" min="1" max="5"
                    style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px;">

                <label style="display:block; margin-top:10px;">Description</label>
                <input type="text" name="description" placeholder="add description...."
                    style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px;">

                <button class="btn" type="submit" style="margin-top:12px;">Submit</button>
            </form>

            <div style="margin-top:12px; text-align:center;">
                <a class="btn outline" href="/">Back to Home</a>
            </div>
        </div>

        <div class="footer">© Learnalytics</div>
    </div>
</body>

</html>
