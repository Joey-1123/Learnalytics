{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Learnalytics</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>

<body>

    <div class="container">

        <a href="{% url 'about' %}" class="btn btn-secondary">
            Read about us →
        </a>

        <h1>
            <span class="highlight">Learnalytics</span>
            <div class="animated-text">
                <span>tracking</span>
                <span>analytics</span>
                <span>insights</span>
                <span>performance</span>
                <span>reports</span>
            </div>
        </h1>

        <p>
            Managing student data shouldn’t be complicated. Learnalytics helps you track performance, gain insights, and
            make better decisions with ease.
        </p>

        <div class="buttons">
            <div class="login-split-wrapper">
                <div class="login-main-label">Login here →</div>

                <div class="login-choices">
                    <a href="/admin/" class="choice admin">Admin</a>
                    <a href="{% url 'teacher_login' %}" class="choice teacher">Teacher</a>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
