{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password | Learnalytics Admin</title>
    <link rel="stylesheet" href="{% static 'css/admin_login.css' %}">
</head>

<body>

    <div class="wrap">
        <div class="card">
            <div class="brand">
                <div class="logo">L</div>
                <div>
                    <h1>Learnalytics</h1>
                    <p>Admin Panel</p>
                </div>
            </div>

            <h2>Forgot Password</h2>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn" type="submit">Send reset link</button>
            </form>

            <div class="links">
                <a href="{% url 'admin:login' %}">Back to Login</a>
            </div>
        </div>
    </div>

</body>
